<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>WFH Tracker</title>

<style>

/* ==========================================================
   ROOT VARIABLES
========================================================== */
:root{

    --primary:#2563eb;
    --primary-hover:#1d4ed8;

    --success:#22c55e;
    --warning:#f59e0b;
    --danger:#ef4444;

    --bg:#f6f8fb;
    --surface:#ffffff;

    --text:#111827;
    --text-light:#6b7280;

    --border:#e5e7eb;

    --radius:16px;

    --shadow:
        0 10px 25px rgba(0,0,0,.08);

    --transition:.25s ease;

    --sidebar-width:260px;

    --sidebar-bg:#1f2937;

    --sidebar-text:#f9fafb;

    --card-hover:#f8fafc;  

}


/* ==========================================================
   RESET
========================================================== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{

    font-family:
    Inter,
    Segoe UI,
    Arial,
    sans-serif;

    background:var(--bg);

    color:var(--text);

    min-height:100vh;
    overflow:hidden;  

}

button{

    font:inherit;

    cursor:pointer;

    border:none;

}

input,
select{

    font:inherit;

    outline:none;

}

a{

    text-decoration:none;

    color:inherit;

}

img{

    max-width:100%;

}


/* ==========================================================
   LAYOUT
========================================================== */

#app{

    display:grid;

    grid-template-columns:
        var(--sidebar-width)
        1fr;

    min-height:100vh;

}

#content{

    padding:28px;

    overflow:auto;

}

.page{

    display:none;

}

.page.active{

    display:block;

}

/* ==========================================================
   LOGIN
========================================================== */
.login-page{

    display:grid;

    grid-template-columns:1fr 420px;

    min-height:100vh;

}

.login-left{

    display:flex;

    justify-content:center;

    align-items:center;

    background:
        linear-gradient(
            135deg,
            #2563eb,
            #1d4ed8
        );

    color:white;

    padding:60px;

}

.brand{

    max-width:500px;

}

.brand h1{

    font-size:58px;

    margin-bottom:20px;

}

.brand p{

    font-size:22px;

    line-height:1.6;

    opacity:.9;

}

.login-right{

    display:flex;

    justify-content:center;

    align-items:center;

    background:white;

    padding:40px;

}

.login-card{

    width:100%;

    max-width:360px;

}

.login-card h2{

    margin-bottom:8px;

}

.subtitle{

    color:var(--text-light);

    margin-bottom:30px;

}

.login-footer{

    margin-top:25px;

    text-align:center;

}

#themeToggle{

    cursor:pointer;

    color:var(--primary);

    font-weight:600;

}


/* ==========================================================
   TOP BAR
========================================================== */



/* ==========================================================
   SIDEBAR
========================================================== */



/* ==========================================================
   DASHBOARD
========================================================== */



/* ==========================================================
   CALENDAR
========================================================== */



/* ==========================================================
   METRICS
========================================================== */



/* ==========================================================
   HOLIDAYS
========================================================== */



/* ==========================================================
   ADMIN
========================================================== */



/* ==========================================================
   COMPONENTS
========================================================== */
.container{

    width:min(1400px,100%);

    margin:auto;

}
.flex{

    display:flex;

}

.flex-between{

    display:flex;

    justify-content:space-between;

    align-items:center;

}

.flex-center{

    display:flex;

    justify-content:center;

    align-items:center;

}

.gap{

    gap:16px;

}

.hidden{

    display:none !important;

}      
.card{

    background:var(--surface);

    border-radius:var(--radius);

    box-shadow:var(--shadow);

    padding:22px;

    margin-bottom:20px;

    border:1px solid var(--border);

    transition:var(--transition);

}

      
.card:hover{

    transform:translateY(-3px);

    box-shadow:
    0 18px 35px rgba(0,0,0,.12);

}

.grid{

    display:grid;

    gap:20px;

}

.grid-2{

    grid-template-columns:
        repeat(2,1fr);

}

.grid-3{

    grid-template-columns:
        repeat(3,1fr);

}

.grid-4{

    grid-template-columns:
        repeat(4,1fr);

}
.btn{

    display:inline-flex;

    align-items:center;

    justify-content:center;

    gap:8px;

    min-height:44px;

    min-width:120px;

    padding:12px 20px;

    border-radius:12px;

    font-weight:600;

    transition:all .25s ease;

    background:var(--primary);

    color:white;

}

.btn:hover{

    transform:translateY(-2px);

}

.btn.secondary{

    background:white;

    color:var(--primary);

    border:1px solid var(--primary);

}

.btn.success{

    background:var(--success);

}

.btn.warning{

    background:var(--warning);

}

.btn.danger{

    background:var(--danger);

}      
.input{

    width:100%;

    padding:12px 14px;

    border-radius:10px;

    border:1px solid var(--border);

    margin-top:6px;

    margin-bottom:16px;

}

label{

    font-weight:600;

    display:block;

}
.progress{

    height:12px;

    background:#e5e7eb;

    border-radius:20px;

    overflow:hidden;

}

.progress-fill{

    height:100%;

    width:0%;

    background:var(--primary);

    transition:width .4s ease;

}

#loadingScreen{

    position:fixed;

    inset:0;

    background:rgba(255,255,255,.75);

    backdrop-filter:blur(6px);

    display:none;

    align-items:center;

    justify-content:center;

    z-index:9999;

}

#loadingScreen.show{

    display:flex;

}

#loadingScreen::after{

    content:"";

    width:52px;

    height:52px;

    border-radius:50%;

    border:5px solid #ddd;

    border-top-color:var(--primary);

    animation:spin 1s linear infinite;

}

@keyframes spin{

    to{

        transform:rotate(360deg);

    }

}      

#toastContainer{

    position:fixed;

    top:20px;

    right:20px;

    display:flex;

    flex-direction:column;

    gap:12px;

    z-index:99999;

}

.toast{

    background:white;

    padding:14px 18px;

    border-radius:12px;

    box-shadow:var(--shadow);

    animation:slideIn .3s;

}

@keyframes slideIn{

    from{

        transform:translateX(40px);

        opacity:0;

    }

    to{

        transform:none;

        opacity:1;

    }

}
      
/* ==========================================================
   ANIMATIONS
========================================================== */
.fade{

    animation:fade .35s ease;

}

@keyframes fade{

    from{

        opacity:0;

        transform:translateY(8px);

    }

    to{

        opacity:1;

        transform:none;

    }

}


/* ==========================================================
   RESPONSIVE
========================================================== */

</style>

</head>

<body>

<!-- =======================================================
     LOADING
======================================================= -->

<div id="loadingScreen">

</div>

<!-- =======================================================
     TOAST
======================================================= -->

<div id="toastContainer"></div>

<!-- =======================================================
     LOGIN
======================================================= -->

<section id="loginView" class="login-page">

    <div class="login-left">

        <div class="brand">

            <h1>WFH Tracker</h1>
          
        </div>

    </div>

    <div class="login-right">

        <div class="login-card card fade">

            <h2>Welcome Back</h2>

            <p class="subtitle">
                Sign in to continue
            </p>

            <label>
                Username
            </label>

            <input
                id="username"
                class="input"
                placeholder="Enter username">

            <label>
                Password
            </label>

            <input
                id="password"
                type="password"
                class="input"
                placeholder="Enter password">

            <button
                class="btn"
                id="loginBtn">

                Login

            </button>

            <div class="login-footer">

                <span id="themeToggle">

                    🌙 Dark Mode

                </span>

            </div>

        </div>

    </div>

</section>

<!-- =======================================================
     APPLICATION
======================================================= -->

<div id="app" hidden>

<header id="topbar"></header>

<aside id="sidebar"></aside>

<main id="content">

<section id="dashboardPage"></section>

<section id="calendarPage" hidden></section>

<section id="metricsPage" hidden></section>

<section id="holidayPage" hidden></section>

<section id="adminPage" hidden></section>

</main>

</div>

   CONFIG
========================================================== */

</body>
</html>
